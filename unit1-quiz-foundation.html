  {
    q: "What does it mean that Spanish is a \"phonetic\" language?",
    options: [
      "Each letter makes the same sound every time it appears",
      "Words are spelled however they sound to the writer",
      "Spanish has no rules for pronunciation",
      "Every word has a silent letter"
    ],
    correct: 0,
    explain: "Phonetic means consistent: once you learn what a letter sounds like, it sounds that way in every word."
  },
  {
    q: "Which vowel sound does the letter \"a\" make in Spanish?",
    options: ["\"ay\" like in cake", "\"ah\" like in father", "\"a\" like in cat", "\"uh\" like in about"],
    correct: 1,
    explain: "Spanish \"a\" is always a clean \"ah\" sound, as in casa."
  },
  {
    q: "How many vowel sounds does Spanish have?",
    options: ["3", "5", "7", "10"],
    correct: 1,
    explain: "Spanish has exactly five vowel sounds: a, e, i, o, u — and they never change."
  },
  {
    q: "Which letter is always silent in Spanish?",
    options: ["j", "h", "r", "ñ"],
    correct: 1,
    explain: "The letter h is never pronounced. Hola sounds like \"OH-lah.\""
  },
  {
    q: "What sound does the Spanish \"j\" make?",
    options: ["Like the English \"j\" in jump", "Like the English \"h\"", "Like the English \"y\"", "It's silent"],
    correct: 1,
    explain: "Spanish j sounds like the English h, so jugo sounds like \"HOO-go.\""
  },
  {
    q: "What does \"ñ\" sound like?",
    options: ["\"n\" as in no", "\"ny\" as in canyon", "\"m\" as in me", "\"ng\" as in sing"],
    correct: 1,
    explain: "The tilde over ñ adds a \"y\" sound, so año sounds like \"AH-nyo.\""
  },
  {
    q: "What does the letter \"ll\" sound like?",
    options: ["Like \"l\"", "Like \"y\"", "Like \"j\" in English", "Silent"],
    correct: 1,
    explain: "Ll typically sounds like the English y, so llamar sounds like \"yah-MAR.\" (Some parts of Spain use a distinct sound instead, and in Argentina and Uruguay it often sounds closer to \"sh\" — but y is the most common pronunciation across Latin America.)"
  },
  {
    q: "Why is it useful that Spanish is phonetic?",
    options: [
      "You don't need to learn any vocabulary",
      "You can read unfamiliar words aloud once you know the sound rules",
      "Every word sounds the same",
      "It means Spanish has no grammar"
    ],
    correct: 1,
