const questions = [
  { q: "Why does \"perro grande\" put the adjective after the noun, unlike English \"big dog\"?", options: ["It\'s a translation mistake", "Spanish word order for descriptive adjectives commonly differs from English", "Grande is actually a noun in this case", "There\'s no rule — it\'s random"], correct: 1, explain: "This is a genuine, consistent pattern in Spanish — not random, and not a mistake." },
  { q: "\"Elena\" and \"ella\" can both refer to the same person. What's the category difference?", options: ["No difference — they\'re the same category", "Elena is a noun (a name); ella is a pronoun standing in for it", "Elena is a verb; ella is a noun", "Both are pronouns"], correct: 1, explain: "Elena names a specific person (noun). Ella stands in for that name without repeating it (pronoun)." },
  { q: "Which part of speech will Unit 4 spend the whole unit on?", options: ["Nouns", "Adjectives", "Verbs", "Articles"], correct: 2, explain: "Unit 4 is entirely about conjugating verbs — everything from this unit about recognizing verbs sets that up." },
  { q: "\"El\" and \"la\" are both articles meaning \"the.\" Why are there two?", options: ["They\'re interchangeable, no reason", "They match the gender of the noun that follows", "El is for singular, la is for plural", "La is more formal than el"], correct: 1, explain: "Spanish articles agree with the noun's gender — el for masculine nouns, la for feminine. The full rules are their own future unit." },
  { q: "\"Hablar,\" \"comer,\" and \"vivir\" are all verbs in their unconjugated form. What is this form called?", options: ["The root", "The infinitive", "The subject", "The article"], correct: 1, explain: "The infinitive is the \"to ___\" form of a verb — hablar (to speak), comer (to eat), vivir (to live)." },
  { q: "In \"Los estudiantes inteligentes estudian mucho,\" what part of speech is \"estudiantes\"?", options: ["Verb", "Noun", "Adjective", "Adverb"], correct: 1, explain: "Estudiantes (students) names the people in the sentence — a noun." },
  { q: "In that same sentence, what part of speech is \"mucho\"?", options: ["Adjective", "Noun", "Adverb", "Article"], correct: 2, explain: "Mucho describes how much they study — modifying the verb estudian, which makes it an adverb here." },
  { q: "Why does knowing parts of speech help with English grammar too, not just Spanish?", options: ["It doesn\'t — they\'re unrelated", "The same categories exist in English, so naming them in Spanish reinforces the concept in both languages", "English doesn\'t have parts of speech", "Only advanced students benefit"], correct: 1, explain: "Nouns, verbs, adjectives, and the rest exist in every language — practicing the concept in Spanish sharpens it in English too." }
];

const resultsMessages = {
  perfect: "Perfect score! You've mastered the parts of speech. 🎯",
  good: "Strong work — the tricky cases are clicking into place.",

};

initQuiz(questions, resultsMessages);
