<script>
const questions = [
  { q: "What does grammatical gender mean for a Spanish noun?", options: ["Whether it's singular or plural", "Every noun is either masculine or feminine", "Whether it's a person or an object", "How the noun is pronounced"], correct: 1, explain: "Gender is just a category every Spanish noun belongs to — not a statement about the object itself." },
  { q: "El libro (the book) is masculine. Which ending gave that away?", options: ["-o", "-a", "-e", "-z"], correct: 0, explain: "Most nouns ending in -o are masculine." },
  { q: "La mesa (the table) is feminine. Which ending gave that away?", options: ["-o", "-a", "-e", "consonant"], correct: 1, explain: "Most nouns ending in -a are feminine." },
  { q: "How do you make \"libro\" plural?", options: ["libros", "libroes", "libres", "librosa"], correct: 0, explain: "Nouns ending in a vowel just add -s: libro → libros." },
  { q: "How do you make \"papel\" plural?", options: ["papels", "papeles", "papeces", "papel"], correct: 1, explain: "Nouns ending in a consonant add -es: papel → papeles." },
  { q: "How do you make \"lápiz\" plural?", options: ["lápizes", "lápices", "lápizs", "lápiz"], correct: 1, explain: "Nouns ending in -z change the z to c, then add -es: lápiz → lápices." },
  { q: "Is \"el problema\" masculine or feminine?", options: ["Masculine", "Feminine"], correct: 0, explain: "El problema is an exception — it ends in -a but is actually masculine." },
  { q: "What's a safe way to remember a noun's gender?", options: ["Guess based on what the object looks like", "Learn the noun together with its article (el/la)", "All nouns are masculine by default", "Gender doesn't matter in Spanish"], correct: 1, explain: "Learning el libro or la mesa as one unit builds in the gender from the start." }
];

const resultsMessages = {
  perfect: "Perfect score! You've got the basics of noun gender down. 🌟",
  good: "Solid work — you're ready to move on to Practice.",

};

initQuiz(questions, resultsMessages);
