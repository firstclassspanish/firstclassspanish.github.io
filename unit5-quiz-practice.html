<script>
const questions = [
  { q: "\"Gato\" (cat) — masculine or feminine?", options: ["Masculine", "Feminine"], correct: 0, explain: "Ends in -o, so it follows the usual masculine pattern: el gato." },
  { q: "\"Ventana\" (window) — masculine or feminine?", options: ["Masculine", "Feminine"], correct: 1, explain: "Ends in -a, so it follows the usual feminine pattern: la ventana." },
  { q: "Make \"carro\" (car) plural:", options: ["carro", "carros", "carroes", "carres"], correct: 1, explain: "Ends in a vowel, so just add -s: carro → carros." },
  { q: "Make \"ciudad\" (city) plural:", options: ["ciudads", "ciudades", "ciudad", "ciudaes"], correct: 1, explain: "Ends in a consonant, so add -es: ciudad → ciudades." },
  { q: "Make \"actriz\" (actress) plural:", options: ["actrizes", "actrices", "actriz", "actrizs"], correct: 1, explain: "Ends in -z: change z to c, then add -es: actriz → actrices." },
  { q: "\"El día\" — why doesn't this follow the -a = feminine pattern?", options: ["It's a typo — it should be \"la día\"", "It's one of the memorized exceptions to the pattern", "Days of the week are always masculine", "The pattern doesn't apply to short words"], correct: 1, explain: "El día is a genuine exception — a common -a word that's actually masculine, and gets memorized individually." },
  { q: "Which of these is the safest way to learn a new noun?", options: ["Memorize just the noun by itself", "Memorize the noun together with its article — el or la", "Assume every noun ending in a vowel is masculine", "Look up the gender only when you need it"], correct: 1, explain: "Pairing a noun with its article from the start (el libro, la mesa) builds gender in automatically." },
  { q: "\"La clase\" (the class) doesn't end in -o or -a. What do you do?", options: ["Guess based on the ending", "Learn its gender individually, like any noun that doesn't fit the pattern", "Assume it's masculine by default", "It has no gender"], correct: 1, explain: "Nouns ending in other letters — like -e, -consonant — need their gender learned along with the word." }
];

const resultsMessages = {
  perfect: "Excellent! Your instincts for gender and plurals are sharp. 🌟",
  good: "Nice work — a bit more practice and you'll have this locked in.",
  low: "Keep at it — revisit the lesson's pattern section and try again."
};

initQuiz(questions, resultsMessages);
</script>
