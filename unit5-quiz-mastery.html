  { q: "\"La mano\" (the hand) — why is this tricky?", options: ["It ends in -o but is feminine — the reverse of the usual pattern", "It has no singular form", "It's actually two words", "It changes gender depending on the sentence"], correct: 0, explain: "La mano is one of the classic -o exceptions — it looks masculine by ending but is feminine." },
  { q: "\"La foto\" (the photo) is feminine even though it ends in -o. Why?", options: ["It's a random exception with no explanation", "It's a shortened form of \"fotografía,\" and keeps that word's feminine gender", "All words for pictures are feminine", "It's borrowed from English"], correct: 1, explain: "Foto is short for fotografía — a feminine word — so the shortened form keeps the original gender." },
  { q: "\"El puente\" (bridge) and \"la fuente\" (fountain) look almost identical. What's actually true about them?", options: ["They're both masculine", "They're both feminine", "They take opposite genders despite the similar spelling", "Puente is a typo for fuente"], correct: 2, explain: "Words ending in -e are especially unpredictable — puente is masculine, fuente is feminine, no shared rule between them." },
  { q: "\"El examen\" and \"la imagen\" both end in -en. What does that tell you?", options: ["Both -en words are always masculine", "Both -en words are always feminine", "The -en ending doesn't reliably predict gender either", "Only one of these words actually ends in -en"], correct: 2, explain: "Examen is masculine and imagen is feminine — another minimal pair proving -en isn't a reliable gender signal." },
  { q: "Why is it \"el agua\" (the water) even though agua is a feminine noun?", options: ["Agua is actually masculine, not feminine", "Spanish swaps la for el before a feminine word starting with a stressed \"a\" sound, purely for pronunciation", "El agua is incorrect — it should be \"la agua\"", "Agua changes gender depending on the region"], correct: 1, explain: "This is a phonetic rule, not a gender exception — agua stays feminine (el agua fría, not frío), the article just shifts to avoid two \"a\" sounds colliding. It only happens in the singular — the plural is las aguas, since las ends in a consonant and the collision never occurs." },
  { q: "\"El amigo\" and \"la amiga\" both mean \"friend.\" What's happening here?", options: ["These are two unrelated words", "The noun's ending changes to match the gender of the actual person being described", "Amiga is a plural form of amigo", "This only happens with the word \"amigo\""], correct: 1, explain: "Nouns describing people often shift between masculine and feminine forms to match the person's own gender — el maestro / la maestra works the same way." },
  { q: "You meet a brand-new Spanish noun you've never seen. What's the most reliable strategy?", options: ["Assume it follows the -o/-a pattern with no exceptions", "Learn it together with its article, since ending alone can't guarantee gender", "Guess based on the English translation", "Treat all new nouns as masculine until told otherwise"], correct: 1, explain: "The -o/-a pattern is a strong starting point, but exceptions are common enough that pairing every noun with its article is the safest habit." }
];
