const questions = [
  {
    q: "What does \"grammatical person\" tell you about a subject?",
    options: ["How big the subject is", "Who it is, relative to the speaker", "Whether it's a noun or a verb", "How the word is spelled"],
    correct: 1,
    explain: "Grammatical person answers one question: is the subject the speaker (1st), the one spoken to (2nd), or someone/something else (3rd)?"
  },
  {
    q: "Which person refers to the speaker?",
    options: ["1st person", "2nd person", "3rd person", "None of these"],
    correct: 0,
    explain: "1st person is the speaker — \"I,\" or \"we\" if others are included."
  },
  {
    q: "Which person refers to the one being spoken to?",
    options: ["1st person", "2nd person", "3rd person", "None of these"],
    correct: 1,
    explain: "2nd person is whoever you're talking to directly — \"you.\""
  },
  {
    q: "In the Box of Six, what do the rows represent?",
    options: ["Singular vs. plural", "Person (1st, 2nd, 3rd)", "Formal vs. informal", "Verb tense"],
    correct: 1,
    explain: "Rows track person — moving down the box shows 1st, 2nd, then 3rd person."
  },
  {
    q: "In the Box of Six, what do the columns represent?",
    options: ["Singular vs. plural", "Person (1st, 2nd, 3rd)", "Formal vs. informal", "Verb tense"],
    correct: 0,
    explain: "Columns track number — one column is singular (one), the other is plural (more than one)."
  },
  {
    q: "Which Spanish pronoun means \"I\"?",
    options: ["tú", "yo", "él", "nosotros"],
    correct: 1,
    explain: "Yo is the 1st person singular pronoun — \"I.\""
  },
  {
    q: "Which Spanish pronoun means \"we\"?",
    options: ["ustedes", "ellos", "nosotros", "vosotros"],
    correct: 2,
    explain: "Nosotros is 1st person plural — \"we.\""
  },
  {
    q: "Why is vosotros left out of the Box of Six in this course?",
    options: [
      "It doesn't exist in Spanish",
      "It's only used in Spain; this course focuses on Latin American Spanish",
      "It's too advanced for Spanish 1",
      "It means the same thing as tú"
    ],
    correct: 1,
    explain: "Vosotros is Spain's informal plural \"you.\" Across Latin America, ustedes covers that role instead, so vosotros isn't needed here."
  }
];
