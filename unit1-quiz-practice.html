<script>
const questions = [
  {
    q: "Which word uses the soft g sound, similar to an English h?",
    options: ["gato", "grande", "gente", "guitarra"],
    correct: 2,
    explain: "G is soft before e or i. Gente starts with an h-like sound: \"HEN-teh.\" Gato keeps the hard g since it's followed by a."
  },
  {
    q: "Which word contains a rolled (trilled) r sound?",
    options: ["pero", "cara", "perro", "para"],
    correct: 2,
    explain: "A double \"rr\" is always rolled. Perro (dog) is trilled, while pero (but) uses the quick single tap."
  },
  {
    q: "In the word \"cielo,\" how is the \"c\" pronounced?",
    options: ["Hard, like \"k\"", "Soft, like \"s\"", "Silent", "Like \"ch\""],
    correct: 1,
    explain: "C is soft before e or i, so cielo starts with an \"s\" sound: \"see-EH-lo.\""
  },
  {
    q: "Which of these words has a silent letter?",
    options: ["gato", "hola", "casa", "mesa"],
    correct: 1,
    explain: "Hola contains a silent h — it's pronounced \"OH-lah.\""
  },
  {
    q: "How would \"llamar\" most likely be pronounced?",
    options: ["\"LAH-mar\"", "\"YAH-mar\"", "\"JAH-mar\" (English j)", "\"HAH-mar\""],
    correct: 1,
    explain: "In most of Latin America, ll sounds like the English y, giving \"YAH-mar.\" (Parts of Spain use a distinct ll sound, and Argentina/Uruguay lean closer to \"sh\" — but y is the most common pronunciation.)"
  },
  {
    q: "Which word uses the hard \"g\" sound (like in \"go\")?",
    options: ["general", "gente", "gato", "gigante (first g)"],
    correct: 2,
    explain: "G is hard before a, o, or u. Gato keeps the hard \"g\" sound; general and gente use the soft sound before e."
  },
  {
    q: "Why does \"queso\" not have a \"kw\" sound like the English word \"quest\"?",
    options: [
      "Because q is always silent in Spanish",
      "Because qu together makes a hard \"k\" sound, with a silent u",
      "Because e changes the q sound",
      "It does have a \"kw\" sound"
    ],
    correct: 1,
    explain: "In Spanish, qu is always a hard \"k\" — the u is silent. Queso sounds like \"KEH-so.\""
  },
  {
    q: "Based on the j rule, how would \"jardín\" (garden) most likely start?",
    options: ["With an English \"j\" sound, like jump", "With an \"h\" sound", "Silently", "With a \"y\" sound"],
    correct: 1,
    explain: "Spanish j sounds like the English h, so jardín starts \"har-DEEN.\""
  },
  {
    q: "Which pair of words is distinguished only by a tapped vs. rolled r?",
    options: ["casa / caza", "pero / perro", "gato / dato", "cielo / suelo"],
    correct: 1,
    explain: "Pero (but) and perro (dog) are a classic minimal pair — the only difference is the single tap vs. the rolled double r."
  }
];

const resultsMessages = {
  perfect: "Perfect score! Your sound rules are locking in. 🌟",
  good: "Nice work — you're ready for the Mastery challenge.",
  low: "Getting there. Review the tricky spots in the lesson, then try again."
};

initQuiz(questions, resultsMessages);
</script>
