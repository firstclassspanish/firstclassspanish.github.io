<script src="js/quiz-engine.js?v=1"></script>
<script>
const questions = [
  { q: "In \"El perro corre rápido,\" what part of speech is \"rápido\"?", options: ["Noun", "Verb", "Adjective", "Adverb"], correct: 3, explain: "Rápido describes how the dog runs — that's an adverb." },
  { q: "In \"La casa grande,\" what part of speech is \"grande\"?", options: ["Adjective", "Adverb", "Verb", "Article"], correct: 0, explain: "Grande describes the noun casa — that's an adjective." },
  { q: "Which of these words is a pronoun?", options: ["perro", "ella", "corre", "grande"], correct: 1, explain: "Ella (she) stands in for a noun — that's a pronoun." },
  { q: "Based on \"perro grande,\" where does a descriptive adjective usually go in Spanish?", options: ["Before the noun, like English", "After the noun", "At the start of the sentence", "It doesn\'t matter"], correct: 1, explain: "Spanish typically places descriptive adjectives after the noun — the opposite order from English." },
  { q: "\"Hablar\" (to speak) is which part of speech?", options: ["Noun", "Verb", "Adjective", "Pronoun"], correct: 1, explain: "Hablar shows an action (even unconjugated) — it's a verb, specifically the infinitive form you'll meet again in Unit 4." },
  { q: "Which of these is an article?", options: ["una", "corre", "rápido", "ella"], correct: 0, explain: "Una signals a feminine noun is coming — that's an article." },
  { q: "\"Nosotros\" belongs to which category?", options: ["Noun", "Verb", "Pronoun", "Adjective"], correct: 2, explain: "Nosotros stands in for a group including the speaker — a pronoun, straight out of Unit 2's Box of Six." },
  { q: "In \"El gato bonito duerme,\" what part of speech is \"bonito\"?", options: ["Noun", "Adjective", "Verb", "Adverb"], correct: 1, explain: "Bonito describes the noun gato — an adjective." },
  { q: "In \"Corre rápido,\" which word answers \"how\" the action happens?", options: ["Corre", "Rápido"], correct: 1, explain: "Rápido tells you how he runs — the defining job of an adverb." }
];

const resultsMessages = {
  perfect: "Perfect score! You're spotting categories everywhere now. 🌟",
  good: "Nice work — you're ready for the Mastery challenge.",
  low: "Getting there. Revisit the tricky cases in the lesson, then try again."
};

initQuiz(questions, resultsMessages);
</script>
