<script>
const questions = [
  { q: "Which box does \"I\" belong in?", options: ["1st person singular", "2nd person singular", "3rd person singular", "1st person plural"], correct: 0, explain: "Just the speaker, alone — 1st person singular. Pronoun: yo." },
  { q: "Which box does \"my dog and I\" belong in?", options: ["3rd person plural", "1st person singular", "1st person plural", "2nd person plural"], correct: 2, explain: "The speaker is included, so it's 1st person — and plural since there's more than one. Pronoun: nosotros." },
  { q: "Which box does \"Elena\" belong in?", options: ["1st person singular", "3rd person singular", "2nd person singular", "3rd person plural"], correct: 1, explain: "One person, not the speaker or listener — 3rd person singular. Pronoun: ella." },
  { q: "Which box does \"you (talking to a classmate)\" belong in?", options: ["2nd person singular", "1st person singular", "3rd person singular", "3rd person plural"], correct: 0, explain: "The person being spoken to, just one — 2nd person singular. Pronoun: tú." },
  { q: "Which box does \"Mom and Dad\" belong in?", options: ["1st person plural", "3rd person singular", "3rd person plural", "2nd person plural"], correct: 2, explain: "Two people, neither speaking nor being spoken to — 3rd person plural. Pronoun: ellos." },
  { q: "Which box does \"my best friend and I\" belong in?", options: ["3rd person plural", "1st person plural", "1st person singular", "2nd person plural"], correct: 1, explain: "The speaker is part of the group — 1st person plural. Pronoun: nosotros." },
  { q: "Which box does \"the principal\" belong in?", options: ["3rd person singular", "2nd person singular", "1st person singular", "3rd person plural"], correct: 0, explain: "One person being talked about — 3rd person singular. Pronoun: él or ella." },
  { q: "Which box does \"usted\" (the formal \"you\") belong in, grammatically?", options: ["2nd person singular", "3rd person singular", "1st person singular", "2nd person plural"], correct: 1, explain: "Even though it means \"you,\" usted is grammatically 3rd person singular — its verb endings match él/ella." },
  { q: "Which box does \"you and your cousins\" (both being spoken to) belong in?", options: ["2nd person plural", "3rd person plural", "1st person plural", "3rd person singular"], correct: 1, explain: "This is plural \"you\" in concept, but since vosotros isn't used, ustedes borrows the 3rd-person-plural box." },
  { q: "Which box does \"the players\" belong in?", options: ["1st person plural", "3rd person singular", "3rd person plural", "2nd person plural"], correct: 2, explain: "A group being talked about, not speaking or spoken to — 3rd person plural. Pronoun: ellos." },
  { q: "Which box does \"my grandparents\" belong in?", options: ["3rd person plural", "1st person plural", "3rd person singular", "2nd person plural"], correct: 0, explain: "A group being talked about — 3rd person plural. Pronoun: ellos." },
  { q: "Which box does \"you\" (talking to your teacher) most likely belong in?", options: ["2nd person singular, using tú", "3rd person singular, using usted", "1st person singular", "3rd person plural"], correct: 1, explain: "A teacher usually calls for the formal usted — grammatically 3rd person singular, out of respect." },
  { q: "Which box does \"just me, myself\" belong in?", options: ["1st person singular", "1st person plural", "3rd person singular", "2nd person singular"], correct: 0, explain: "Still just the speaker alone — 1st person singular, same box as \"I.\"" },
  { q: "Which box does \"the students\" belong in?", options: ["1st person plural", "3rd person singular", "2nd person plural", "3rd person plural"], correct: 3, explain: "A group being talked about — 3rd person plural. Pronoun: ellos or ellas." }
];

const resultsMessages = {
  perfect: "Perfect score! You're sorting subjects on sight now. 🌟",
  good: "Solid run — a few more reps and this will be automatic.",
  low: "Good practice. Run it again whenever you'd like — the subjects mix up each time."
};

initQuiz(questions, resultsMessages);
</script>
