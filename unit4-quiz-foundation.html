<script>
const questions = [
  { q: "What is an infinitive?", options: ["A conjugated verb form", "A verb\'s plain, unconjugated \"to ___\" form", "A type of noun", "A subject pronoun"], correct: 1, explain: "Hablar (to speak), comer (to eat), vivir (to live) — all infinitives, the starting point before conjugation." },
  { q: "What are the three verb families in Spanish?", options: ["-ar, -er, -ir", "-o, -s, -n", "1st, 2nd, 3rd", "Regular, irregular, reflexive"], correct: 0, explain: "Every Spanish infinitive ends in -ar, -er, or -ir — that ending determines the family." },
  { q: "Which family does \"hablar\" belong to?", options: ["-er", "-ir", "-ar", "None of these"], correct: 2, explain: "Hablar ends in -ar." },
  { q: "What is the yo form of hablar?", options: ["hablo", "hablas", "habla", "hablamos"], correct: 0, explain: "Yo takes the -o ending for -ar verbs: hablo." },
  { q: "What is the tú form of comer?", options: ["como", "comes", "come", "comen"], correct: 1, explain: "Tú takes the -es ending for -er verbs: comes." },
  { q: "What is the nosotros form of vivir?", options: ["vivo", "vives", "vivimos", "viven"], correct: 2, explain: "Nosotros takes the -imos ending for -ir verbs: vivimos." },
  { q: "Which box in the Box of Six is skipped when conjugating, in this course?", options: ["1st plural", "2nd singular", "2nd plural (vosotros)", "3rd plural"], correct: 2, explain: "Vosotros isn't used in Latin American Spanish, so this course skips its conjugation entirely." },
  { q: "What ending do ellos/ustedes take for -ar verbs?", options: ["-an", "-en", "-amos", "-as"], correct: 0, explain: "3rd person plural takes -an for -ar verbs: hablan." }
];

const resultsMessages = {
  perfect: "Perfect score! You've got the basics of conjugation down. 🌟",
  good: "Solid work — you're ready to move on to Practice.",
  low: "Good start. Revisit the lesson, then give it another shot."
};

initQuiz(questions, resultsMessages);
</script>
