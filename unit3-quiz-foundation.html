<script>
const questions = [
  { q: "What does a noun do?", options: ["Shows action", "Names a person, place, thing, or idea", "Describes a noun", "Connects two words"], correct: 1, explain: "A noun names something — perro (dog), casa (house), amor (love) are all nouns." },
  { q: "What does a verb show?", options: ["A description", "Action or a state of being", "A category of noun", "A number"], correct: 1, explain: "Verbs show action (corre = runs) or state of being (es = is)." },
  { q: "What does an adjective do?", options: ["Names a thing", "Shows action", "Describes a noun", "Stands in for a noun"], correct: 2, explain: "Adjectives describe nouns — grande (big), bonito (pretty)." },
  { q: "What does an adverb usually describe?", options: ["A noun", "A verb — often how, when, or where", "An article", "A pronoun"], correct: 1, explain: "Adverbs usually describe verbs: corre rápido (runs fast) — rápido describes how he runs." },
  { q: "What does an article do?", options: ["Describes a noun", "Shows action", "Signals that a noun is coming", "Connects two sentences"], correct: 2, explain: "Articles (el, la, un, una) come right before a noun to signal it's about to appear." },
  { q: "What is a pronoun?", options: ["A word that names a specific thing", "A word that stands in for a noun", "A word that describes an action", "A word that shows number"], correct: 1, explain: "Pronouns (ella, nosotros) stand in for a noun so you don't have to repeat a name — you met these in Unit 2." },
  { q: "Which part of speech is \"perro\" (dog)?", options: ["Verb", "Adjective", "Noun", "Adverb"], correct: 2, explain: "Perro names a thing — that makes it a noun." },
  { q: "Which part of speech is \"corre\" (runs)?", options: ["Noun", "Verb", "Article", "Pronoun"], correct: 1, explain: "Corre shows action — that makes it a verb." }
];

const resultsMessages = {
  perfect: "Perfect score! You've got the six categories down. 🌟",
  good: "Solid work — you're ready to move on to Practice.",
  low: "Good start. Revisit the lesson, then give it another shot."
};

initQuiz(questions, resultsMessages);
</script>
