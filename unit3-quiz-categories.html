<script>
const questions = [
  { q: "Which category does \"mesa\" (table) belong to?", options: ["Noun", "Verb", "Adjective", "Article"], correct: 0, explain: "Mesa names a thing — that makes it a noun." },
  { q: "Which category does \"ella\" (she) belong to?", options: ["Noun", "Pronoun", "Verb", "Adverb"], correct: 1, explain: "Ella stands in for a name instead of repeating it — a pronoun, straight from Unit 2's Box of Six." },
  { q: "Which category does \"corre\" (runs) belong to?", options: ["Noun", "Adjective", "Verb", "Article"], correct: 2, explain: "Corre shows action — a verb." },
  { q: "Which category does \"grande\" (big) belong to?", options: ["Adjective", "Adverb", "Noun", "Pronoun"], correct: 0, explain: "Grande describes a noun — an adjective." },
  { q: "Which category does \"rápido\" (fast) belong to?", options: ["Adjective", "Adverb", "Verb", "Article"], correct: 1, explain: "Rápido describes how the action happens — an adverb." },
  { q: "Which category does \"el\" (the) belong to?", options: ["Noun", "Pronoun", "Adjective", "Article"], correct: 3, explain: "El signals a masculine noun is coming — an article." },
  { q: "Which category does \"hablar\" (to speak) belong to?", options: ["Noun", "Verb", "Adjective", "Adverb"], correct: 1, explain: "Hablar shows an action, even unconjugated — a verb, specifically the infinitive form you'll meet again in Unit 4." },
  { q: "Which category does \"nosotros\" (we) belong to?", options: ["Noun", "Pronoun", "Adjective", "Article"], correct: 1, explain: "Nosotros stands in for a group that includes the speaker — a pronoun." },
  { q: "Which category does \"bonito\" (pretty) belong to?", options: ["Adjective", "Adverb", "Verb", "Noun"], correct: 0, explain: "Bonito describes a noun — an adjective." },
  { q: "Which category does \"una\" (a/an) belong to?", options: ["Article", "Adjective", "Pronoun", "Noun"], correct: 0, explain: "Una signals a feminine noun is coming — an article." },
  { q: "Which category does \"bien\" (well) belong to?", options: ["Adjective", "Adverb", "Verb", "Article"], correct: 1, explain: "Bien describes how something is done — an adverb." },
  { q: "Which category does \"perro\" (dog) belong to?", options: ["Noun", "Verb", "Pronoun", "Adjective"], correct: 0, explain: "Perro names a thing — a noun." },
  { q: "Which category does \"usted\" (formal you) belong to?", options: ["Noun", "Pronoun", "Article", "Adjective"], correct: 1, explain: "Usted stands in for a name, just like ella or tú — a pronoun, even though it's used formally." },
  { q: "\"Elena\" is a name. Which category does it belong to — and how is that different from \"ella\"?", options: [
      "Noun — Elena names a specific person, while ella stands in for that name",
      "Pronoun — names are always pronouns",
      "They\'re the same category",
      "Verb — names show identity, which counts as an action"
    ], correct: 0, explain: "Elena is a noun — it names someone specifically. Ella is the pronoun that stands in for that name without repeating it." }
];

const resultsMessages = {
  perfect: "Perfect score! You're spotting categories on sight now. 🌟",
  good: "Solid run — a few more reps and this will be automatic.",
  low: "Good practice. Run it again whenever you'd like — the mix changes each time."
};

initQuiz(questions, resultsMessages);
</script>
