<script>
const questions = [
  { q: "What does \"concordancia\" (agreement) mean in Spanish grammar?", options: ["Verbs and subjects must match in person", "Articles and adjectives must match the noun's gender and number", "All nouns must end in a vowel", "Sentences must always start with a subject"], correct: 1, explain: "Concordancia specifically refers to articles and adjectives matching the gender and number of the noun they go with." },
  { q: "Which article means \"the\" for a masculine singular noun?", options: ["la", "el", "los", "las"], correct: 1, explain: "El libro — masculine singular takes el." },
  { q: "Which article means \"the\" for a feminine plural noun?", options: ["la", "el", "los", "las"], correct: 3, explain: "Las mesas — feminine plural takes las." },
  { q: "Fill in the blank: el libro roj__ (the red book)", options: ["-o", "-a", "-os", "-as"], correct: 0, explain: "Libro is masculine singular, so the adjective takes the matching -o ending: rojo." },
  { q: "Fill in the blank: la mesa roj__ (the red table)", options: ["-o", "-a", "-os", "-as"], correct: 1, explain: "Mesa is feminine singular, so the adjective takes the matching -a ending: roja." },
  { q: "What's un/una the Spanish equivalent of?", options: ["\"the\"", "\"a/an\"", "\"some\"", "\"this\""], correct: 1, explain: "Un and una are indefinite articles, equivalent to \"a\" or \"an\" in English — and they agree with gender just like el/la." },
  { q: "Change the noun's number, and what happens to the adjective describing it?", options: ["Nothing — adjectives never change", "The adjective's ending changes to match", "Only the article changes, never the adjective", "The noun and adjective swap places"], correct: 1, explain: "Both the article and the adjective shift to match the noun — los libros rojos, not \"los libros rojo.\"" },
  { q: "Which best describes how article, noun, and adjective relate in a Spanish phrase?", options: ["They're independent and don't need to match", "All three carry the same gender and number, like matching puzzle pieces", "Only the noun and article need to match; adjectives are free", "Only the noun and adjective need to match; articles are free"], correct: 1, explain: "That's the whole idea of concordancia — one noun's gender and number ripple out to everything describing it." }
];

const resultsMessages = {
  perfect: "Perfect score! You've got the basics of agreement down. 🌟",
  good: "Solid work — you're ready to move on to Practice.",
  low: "Good start. Revisit the lesson, then give it another shot."
};

initQuiz(questions, resultsMessages);
</script>
